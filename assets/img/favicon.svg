<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer circle: bold dark teal -->
  <circle cx="16" cy="16" r="11" fill="#092f2b" stroke="#0e6e66" stroke-width="2"/>
  
  <!-- Center circle: bright cyan -->
  <circle cx="16" cy="16" r="4.5" fill="#00f3ff"/>
  
  <!-- Vertical cyan line: bold, stroke-width 2 -->
  <line x1="16" y1="1" x2="16" y2="31" stroke="#00f3ff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Simple blade separators: dark lines radiating from the center -->
  <g stroke="#092f2b" stroke-width="1.5">
    <line x1="16" y1="11.5" x2="16" y2="5" />
    <line x1="19.9" y1="13.75" x2="25.5" y2="10.5" />
    <line x1="19.9" y1="18.25" x2="25.5" y2="21.5" />
    <line x1="16" y1="20.5" x2="16" y2="27" />
    <line x1="12.1" y1="18.25" x2="6.5" y2="21.5" />
    <line x1="12.1" y1="13.75" x2="6.5" y2="10.5" />
  </g>
</svg>
