<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%" fx="35%" fy="35%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="55%" stop-color="#00a3c2" />
      <stop offset="100%" stop-color="#08383a" />
    </radialGradient>
    <radialGradient id="lensReflex" cx="35%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="bladeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#555c63" />
      <stop offset="100%" stop-color="#282c2f" />
    </linearGradient>
    <linearGradient id="bladeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#495057" />
      <stop offset="100%" stop-color="#1f2225" />
    </linearGradient>
  </defs>

  <!-- Outer Black Outer Ring -->
  <circle cx="32" cy="32" r="23" fill="#1b1e20" />
  <circle cx="32" cy="32" r="22.2" fill="#2d3238" stroke="#495057" stroke-width="0.8" />
  
  <!-- Aperture Blades -->
  <g stroke="#16181a" stroke-width="1">
    <!-- Blade 1 -->
    <path d="M 54 32 A 22 22 0 0 1 43 51.05 L 36 38.93 A 8 8 0 0 0 40 32 Z" fill="url(#bladeGrad1)"/>
    <!-- Blade 2 -->
    <path d="M 43 51.05 A 22 22 0 0 1 21 51.05 L 28 38.93 A 8 8 0 0 0 36 38.93 Z" fill="url(#bladeGrad2)"/>
    <!-- Blade 3 -->
    <path d="M 21 51.05 A 22 22 0 0 1 10 32 L 24 32 A 8 8 0 0 0 28 38.93 Z" fill="url(#bladeGrad1)"/>
    <!-- Blade 4 -->
    <path d="M 10 32 A 22 22 0 0 1 21 12.95 L 28 25.07 A 8 8 0 0 0 24 32 Z" fill="url(#bladeGrad2)"/>
    <!-- Blade 5 -->
    <path d="M 21 12.95 A 22 22 0 0 1 43 12.95 L 36 25.07 A 8 8 0 0 0 28 25.07 Z" fill="url(#bladeGrad1)"/>
    <!-- Blade 6 -->
    <path d="M 43 12.95 A 22 22 0 0 1 54 32 L 40 32 A 8 8 0 0 0 36 25.07 Z" fill="url(#bladeGrad2)"/>
  </g>

  <!-- Central Lens Core -->
  <circle cx="32" cy="32" r="8" fill="url(#lens)" stroke="#16181a" stroke-width="1" />
  <circle cx="32" cy="32" r="8" fill="url(#lensReflex)" />
  <!-- Inner circular reflex details -->
  <circle cx="30" cy="30" r="4.5" fill="none" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.35" />
  <circle cx="32" cy="32" r="7.2" fill="none" stroke="#00f3ff" stroke-width="0.4" stroke-opacity="0.25" />

  <!-- Vertical & Horizontal Crosshair Lines -->
  <line x1="32" y1="2" x2="32" y2="62" stroke="#00d4ff" stroke-width="2.2" stroke-linecap="round" />
  <line x1="14" y1="32" x2="50" y2="32" stroke="#00d4ff" stroke-width="2.2" stroke-linecap="round" />
</svg>
